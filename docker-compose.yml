services:
  mongodb:
    image: mongo:7
    container_name: todoapi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  todoapi:
    build: .
    container_name: todoapi
    ports:
      - "5000:8080"
    environment:
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=TodoApiDb
    depends_on:
      - mongodb

volumes:
  mongodb_data:
